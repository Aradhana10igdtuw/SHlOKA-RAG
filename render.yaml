services:
  - type: web
    name: shloka-rag
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: EMBEDDING_MODE
        value: local
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
